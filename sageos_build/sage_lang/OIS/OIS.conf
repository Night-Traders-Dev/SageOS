# ═══════════════════════════════════════════════════════════════════════════════
# OIS.conf — SageLang
# ═══════════════════════════════════════════════════════════════════════════════

# ── Identity ──────────────────────────────────────────────────────────────────
app_name      = sage
display_name  = SageLang
binary        = sage
install_path  = /usr/local/bin
additional_info = A modern interpreted/compiled language with JIT, LLVM, and ML support.

# ── Updates ───────────────────────────────────────────────────────────────────
version_url   = https://raw.githubusercontent.com/Night-Traders-Dev/sagelang/main/VERSION
github        = Night-Traders-Dev/sagelang
update_mode   = ask

# ── Install scope ─────────────────────────────────────────────────────────────
require_sudo  = auto

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
system     = make
# Root Makefile delegates to core/. Binary lands at core/sage.
binary_out = core/sage

# ── Required dependencies ─────────────────────────────────────────────────────
[deps]

gcc.apt      = gcc
gcc.pacman   = gcc
gcc.dnf      = gcc
gcc.yum      = gcc
gcc.zypper   = gcc
gcc.apk      = gcc
gcc.emerge   = sys-devel/gcc
gcc.xbps     = gcc
gcc.brew     = gcc
gcc.macports = gcc
gcc.pkg      = gcc
gcc.pkgin    = gcc
gcc.cmd      = gcc
gcc.desc     = C compiler

make.apt      = make
make.pacman   = make
make.dnf      = make
make.yum      = make
make.zypper   = make
make.apk      = make
make.emerge   = sys-devel/make
make.xbps     = make
make.brew     = make
make.macports = gmake
make.pkg      = gmake
make.pkgin    = gmake
make.cmd      = make
make.desc     = Build tool

pkg-config.apt      = pkg-config
pkg-config.pacman   = pkgconf
pkg-config.dnf      = pkgconfig
pkg-config.yum      = pkgconfig
pkg-config.zypper   = pkg-config
pkg-config.apk      = pkgconf
pkg-config.emerge   = dev-util/pkgconf
pkg-config.xbps     = pkg-config
pkg-config.brew     = pkg-config
pkg-config.macports = pkgconfig
pkg-config.pkg      = pkgconf
pkg-config.pkgin    = pkg-config
pkg-config.cmd      = pkg-config
pkg-config.desc     = Library detection helper

curl.apt      = libcurl4-openssl-dev
curl.pacman   = curl
curl.dnf      = libcurl-devel
curl.yum      = libcurl-devel
curl.zypper   = libcurl-devel
curl.apk      = curl-dev
curl.emerge   = net-misc/curl
curl.xbps     = libcurl-devel
curl.brew     = curl
curl.macports = curl
curl.pkg      = curl
curl.pkgin    = curl
curl.cmd      = pkgconfig:libcurl
curl.desc     = HTTP/HTTPS networking library

openssl.apt      = libssl-dev
openssl.pacman   = openssl
openssl.dnf      = openssl-devel
openssl.yum      = openssl-devel
openssl.zypper   = libopenssl-devel
openssl.apk      = openssl-dev
openssl.emerge   = dev-libs/openssl
openssl.xbps     = openssl-devel
openssl.brew     = openssl
openssl.macports = openssl
openssl.pkg      = openssl
openssl.pkgin    = openssl
openssl.cmd      = pkgconfig:openssl
openssl.desc     = SSL/TLS and cryptography

# ── Optional dependencies ─────────────────────────────────────────────────────
[deps.optional]

# GNU Make — BSD systems ship BSD make; GNU make is needed to build SageLang
# On Linux/macOS, 'make' is already GNU make. On BSD it needs explicit install.
gmake.pkg     = gmake
gmake.pkg_add = gmake
gmake.pkgin   = gmake
gmake.cmd     = gmake
gmake.desc    = GNU Make (required on BSD — system make is BSD make)


clang.apt      = clang
clang.pacman   = clang
clang.dnf      = clang
clang.yum      = clang
clang.zypper   = clang
clang.apk      = clang
clang.emerge   = sys-devel/clang
clang.xbps     = clang
clang.brew     = llvm
clang.macports = clang-17
clang.pkg      = llvm
clang.pkgin    = clang
clang.cmd      = clang
clang.desc     = LLVM/Clang (for --compile-llvm backend)

vulkan.apt      = libvulkan-dev
vulkan.pacman   = vulkan-icd-loader
vulkan.dnf      = vulkan-loader-devel
vulkan.zypper   = libvulkan1
vulkan.apk      = vulkan-loader-dev
vulkan.brew     = molten-vk
vulkan.macports = vulkan-loader
vulkan.pkg      = vulkan-loader
vulkan.cmd      = pkgconfig:vulkan
vulkan.desc     = Vulkan GPU support (optional)

glfw.apt      = libglfw3-dev
glfw.pacman   = glfw
glfw.dnf      = glfw-devel
glfw.brew     = glfw
glfw.macports = glfw
glfw.pkg      = glfw
glfw.cmd      = pkgconfig:glfw3
glfw.desc     = Window/input for GPU examples (optional)

python3.apt      = python3
python3.pacman   = python
python3.dnf      = python3
python3.yum      = python3
python3.zypper   = python3
python3.apk      = python3
python3.brew     = python@3
python3.macports = python311
python3.pkg      = python3
python3.pkgin    = python311
python3.cmd      = python3
python3.desc     = Python 3 (benchmark/codegen scripts)
