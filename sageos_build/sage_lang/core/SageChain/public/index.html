<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageChain Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1 class="logo">🌿 SageChain</h1>
            <nav>
                <a href="/" class="active">Blocks</a>
                <a href="#">Transactions</a>
                <a href="#">Accounts</a>
            </nav>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search block height or tx hash...">
                <button onclick="search()">Search</button>
            </div>
        </div>
    </header>

    <main class="container mt-4">
        <section class="dashboard">
            <div class="card">
                <h3>Latest Block</h3>
                <p id="latestBlockHeight">...</p>
            </div>
            <div class="card">
                <h3>Network Status</h3>
                <p class="status-active">● Active</p>
            </div>
            <div class="card">
                <h3>Total Transactions</h3>
                <p id="totalTxs">...</p>
            </div>
        </section>

        <section class="mt-4">
            <div class="card">
                <h2 class="card-title">Recent Blocks</h2>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Height</th>
                                <th>Hash</th>
                                <th>Txs</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="blocksTableBody">
                            <tr><td colspan="4" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Block Modal -->
        <div id="blockModal" class="modal">
            <div class="modal-content card">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle">Details</h2>
                <pre id="modalData"></pre>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
