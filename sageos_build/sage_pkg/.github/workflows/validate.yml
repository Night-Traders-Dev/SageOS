name: Validate Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install SageLang
      run: |
        curl -sL https://raw.githubusercontent.com/Night-Traders-Dev/SageLang/main/install.sh | bash
        echo "/home/runner/.sage/bin" >> $GITHUB_PATH

    - name: Verify bundled json.sage copies are in sync with lib/
      run: |
        # lib/json.sage is the canonical source; all bundled copies must match it
        # (ignoring the auto-generated header comment at the top of each copy)
        strip_header() { tail -n +5 "$1"; }
        diff <(strip_header lib/json.sage) <(strip_header json.sage) || \
          (echo "::error::json.sage is out of sync with lib/json.sage. Run 'make sync-deps'." && exit 1)
        diff <(strip_header lib/json.sage) <(strip_header packages/sagepkg/universal/json.sage) || \
          (echo "::error::packages/sagepkg/universal/json.sage is out of sync with lib/json.sage. Run 'make sync-deps'." && exit 1)

    - name: Run Validation Script
      run: |
        # Provide json.sage to the validation script from the canonical lib/ location
        cp lib/json.sage scripts/json.sage
        sage scripts/validate.sage
